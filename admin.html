<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akash Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020202;
color:white;
overflow-x:hidden;
min-height:100vh;
padding:20px;
}



/* BLUE GLOW */

body::before{
content:"";
position:fixed;
width:650px;
height:650px;
background:radial-gradient(circle,#00bfff 0%,transparent 70%);
filter:blur(140px);
opacity:0.22;
top:-220px;
left:-220px;
z-index:-5;
animation:floatGlow 8s infinite alternate;
}

body::after{
content:"";
position:fixed;
width:550px;
height:550px;
background:radial-gradient(circle,#0044ff 0%,transparent 70%);
filter:blur(140px);
opacity:0.18;
bottom:-220px;
right:-220px;
z-index:-5;
animation:floatGlow 9s infinite alternate;
}

@keyframes floatGlow{

from{
transform:translateY(-25px);
}

to{
transform:translateY(25px);
}

}



/* LOGIN */

.loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
width:420px;
padding:35px;
border-radius:32px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.08);
}

.logo{
text-align:center;
font-size:34px;
font-weight:800;
color:#00bfff;
margin-bottom:10px;
}

.sub{
text-align:center;
line-height:28px;
color:#bdbdbd;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:16px;
margin-top:15px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.loginBtn{
width:100%;
padding:16px;
margin-top:22px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#00a2ff,#0044ff);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}



/* DASHBOARD */

.dashboard{
display:none;
max-width:1200px;
margin:auto;
}



/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:30px;
gap:20px;
}

.mainTitle{
font-size:36px;
font-weight:800;
color:#00bfff;
}



/* LIVE */

.liveStatus{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
color:#00ff99;
}

.liveDot{
width:12px;
height:12px;
border-radius:50%;
background:#00ff99;
box-shadow:0 0 18px #00ff99;
animation:blink 0.8s infinite;
}

@keyframes blink{

0%{
opacity:1;
}

50%{
opacity:0.3;
}

100%{
opacity:1;
}

}



/* STATS */

.stats{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:30px;
}

.statCard{
background:rgba(255,255,255,0.05);
padding:22px;
border-radius:24px;
min-width:220px;
border:1px solid rgba(255,255,255,0.08);
}

.statTitle{
font-size:14px;
color:#aaa;
}

.statValue{
font-size:34px;
font-weight:800;
margin-top:10px;
color:#00bfff;
}



/* SEARCH */

.searchBar{
width:100%;
padding:18px;
margin-bottom:28px;
border:none;
outline:none;
border-radius:20px;
background:rgba(255,255,255,0.06);
color:white;
font-size:15px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 25px rgba(0,170,255,0.08);
}



/* POSTS */

.card{
background:rgba(255,255,255,0.05);
padding:28px;
border-radius:30px;
margin-bottom:25px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:220px;
height:220px;
background:radial-gradient(circle,rgba(0,191,255,0.15),transparent 70%);
top:-70px;
right:-70px;
filter:blur(45px);
}

.label{
color:#00bfff;
font-weight:700;
}

.row{
margin-top:14px;
line-height:28px;
position:relative;
z-index:2;
}

.adminNote{
height:120px;
resize:none;
}



/* STATUS */

.status{
margin-top:18px;
display:inline-block;
padding:10px 18px;
border-radius:14px;
font-size:14px;
font-weight:700;
}



/* BUTTONS */

.actions{
display:flex;
gap:14px;
flex-wrap:wrap;
margin-top:24px;
}

.actionBtn{
padding:14px 20px;
border:none;
border-radius:16px;
color:white;
font-weight:700;
cursor:pointer;
}

.approve{
background:linear-gradient(90deg,#00cc66,#00ff99);
}

.reject{
background:linear-gradient(90deg,#ff8800,#ff5500);
}

.delete{
background:linear-gradient(90deg,#ff0033,#cc0000);
}

.save{
background:linear-gradient(90deg,#00a2ff,#0044ff);
}

</style>

</head>

<body>



<!-- LOGIN -->

<div class="loginPage" id="loginPage">

<div class="loginBox">

<div class="logo">
AKASH ADMIN
</div>

<div class="sub">
Secure Premium Admin Access
</div>

<input
type="text"
id="adminUser"
placeholder="Enter Username">

<input
type="password"
id="adminPass"
placeholder="Enter Password">

<button
class="loginBtn"
onclick="loginAdmin()">
Access Dashboard
</button>

</div>

</div>



<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="topBar">

<div>

<div class="mainTitle">
AKASH CONTROL PANEL
</div>

<div class="liveStatus">

<div class="liveDot"></div>

Live Moderation Active

</div>

</div>

</div>



<!-- STATS -->

<div class="stats">

<div class="statCard">

<div class="statTitle">
TOTAL CONFESSIONS
</div>

<div class="statValue"
id="totalPosts">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
APPROVED
</div>

<div class="statValue"
id="approvedPosts">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
PENDING
</div>

<div class="statValue"
id="pendingPosts">
0
</div>

</div>

</div>



<!-- SEARCH -->

<input
type="text"
id="searchInput"
class="searchBar"
placeholder="Search confession, username or Password..."
onkeyup="searchPosts()"
>



<div id="postsContainer"></div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBF3Jogmn2E-jRY6lIF9yR5qHURU9xhak8",

authDomain: "akash-65165.firebaseapp.com",

projectId: "akash-65165",

storageBucket: "akash-65165.firebasestorage.app",

messagingSenderId: "62675604922",

appId: "1:62675604922:web:7ec9bd6567c7a0c7d93983"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



/* LOGIN */

window.loginAdmin = function(){

let user =
document.getElementById("adminUser").value;

let pass =
document.getElementById("adminPass").value;

if(user === "Babar" && pass === "1212"){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

loadPosts();

}else{

showPopup("Wrong admin username or password");

}

}



/* LOAD POSTS */

async function loadPosts(){

const querySnapshot =
await getDocs(collection(db,"confessions"));

let output = "";

let total = 0;
let approved = 0;
let pending = 0;



querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

total++;

let statusHTML = `
<div class="status"
style="
background:rgba(255,255,255,0.06);
">
⏳ Pending
</div>
`;



if(data.approved === true){

approved++;

statusHTML = `
<div class="status"
style="
background:rgba(0,255,140,0.12);
border:1px solid rgba(0,255,140,0.25);
color:#00ff99;
">
✔ Approved
</div>
`;

}else if(data.rejected === true){

statusHTML = `
<div class="status"
style="
background:rgba(255,0,60,0.12);
border:1px solid rgba(255,0,60,0.25);
color:#ff4d6d;
">
✖ Rejected
</div>
`;

pending++;

}else{

pending++;

}



output += `

<div class="card searchableCard">

<div class="row">
<span class="label">Confession:</span><br>
${data.confession}
</div>

<div class="row">
<span class="label">Username:</span>
${data.username}
</div>

<div class="row">
<span class="label">Password:</span>
${data.rollno}
</div>

<div class="row">
<span class="label">Date:</span>
${data.time}
</div>

${statusHTML}

<textarea
class="adminNote"
id="note-${docSnap.id}"
placeholder="Write admin caption...">${data.adminNote || ""}</textarea>



<div class="actions">

<button
class="actionBtn save"
onclick="saveNote('${docSnap.id}')">
Save Caption
</button>

<button
class="actionBtn approve"
onclick="approvePost('${docSnap.id}')">
Approve
</button>

<button
class="actionBtn reject"
onclick="rejectPost('${docSnap.id}')">
Reject
</button>

<button
class="actionBtn delete"
onclick="deletePost('${docSnap.id}')">
Delete
</button>

</div>

</div>

`;

});



document.getElementById("postsContainer")
.innerHTML = output;

document.getElementById("totalPosts")
.innerText = total;

document.getElementById("approvedPosts")
.innerText = approved;

document.getElementById("pendingPosts")
.innerText = pending;

}



/* SEARCH */

window.searchPosts = function(){

let input =
document.getElementById("searchInput")
.value
.toLowerCase();

let cards =
document.querySelectorAll(".searchableCard");

cards.forEach(card=>{

if(card.innerText.toLowerCase().includes(input)){

card.style.display = "block";

}else{

card.style.display = "none";

}

});

}



/* SAVE NOTE */

window.saveNote = async function(id){

let note =
document.getElementById(`note-${id}`).value;

await updateDoc(doc(db,"confessions",id),{
adminNote:note
});

showPopup("Admin caption saved");

}



/* APPROVE */

window.approvePost = async function(id){

await updateDoc(doc(db,"confessions",id),{
approved:true,
rejected:false
});

showPopup("Confession approved");

loadPosts();

}



/* REJECT */

window.rejectPost = async function(id){

await updateDoc(doc(db,"confessions",id),{
approved:false,
rejected:true
});

showPopup("Confession rejected");

loadPosts();

}



/* DELETE */

window.deletePost = async function(id){

await deleteDoc(doc(db,"confessions",id));

showPopup("Confession deleted");

loadPosts();

}



/* POPUP */

window.showPopup = function(message){

let popup =
document.createElement("div");

popup.innerHTML = `
<div style="
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.82);
padding:18px 28px;
border-radius:18px;
border:1px solid rgba(0,191,255,0.3);
color:white;
font-weight:600;
z-index:99999;
backdrop-filter:blur(18px);
">
${message}
</div>
`;

document.body.appendChild(popup);

setTimeout(()=>{

popup.remove();

},3500);

}

</script>

</body>
</html>
